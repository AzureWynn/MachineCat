version: '3.8'

services:
  ros2-gazebo:
    build:
      context: .
      dockerfile: Dockerfile.alternative
    container_name: machinecat-ros2-sim
    restart: unless-stopped
    ports:
      - "5901:5901"    # VNC 端口
      - "6080:6080"    # noVNC Web 访问
      - "9090:9090"    # rosbridge WebSocket
    environment:
      - DISPLAY=:1
      - VNC_RESOLUTION=1920x1080
      - VNC_PASSWORD=robot
    volumes:
      - ./src:/ros2_ws/src
    shm_size: "512m"
    networks:
      - ros2-network

  # 可选：Web 控制面板（通过 rosbridge 连接）
  ros2-web:
    image: nginx:alpine
    container_name: machinecat-ros2-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ros2-gazebo
    networks:
      - ros2-network

volumes:
  gazebo_models:

networks:
  ros2-network:
    driver: bridge
