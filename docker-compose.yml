version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6.0
    container_name: robot-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
    networks:
      - robot-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: robot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - robot-network

  # 后端服务
  robot-server:
    build:
      context: ./robot-server
      dockerfile: Dockerfile
    container_name: robot-server
    restart: always
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/robot-cat?authSource=admin
      - REDIS_URL=redis://redis:6379
      - SOLANA_NETWORK=${SOLANA_NETWORK:-DEVNET}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ROBOT_STATE_PROGRAM_ID=${ROBOT_STATE_PROGRAM_ID:-ARjXV5jAyB1t53WE4c3eEf6gftFnF7aiympwBCfSvVoY}
      - PAYMENT_MODE=${PAYMENT_MODE:-mock}
      - LIFI_API_KEY=${LIFI_API_KEY:-}
      - MAGIC_BLOCK_API_KEY=${MAGIC_BLOCK_API_KEY:-}
      - X402_API_KEY=${X402_API_KEY:-}
      - PAYMENT_RECEIVER_ADDRESS=${PAYMENT_RECEIVER_ADDRESS:-}
      - LLM_API_URL=${LLM_API_URL:-http://172.17.0.1:11434/api/generate}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:0.5b}
      - USE_LLM_MOCK=${USE_LLM_MOCK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
    depends_on:
      - mongodb
      - redis
    networks:
      - robot-network

  # 前端应用
  robot-app:
    build:
      context: ./robot-app
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE=${REACT_APP_API_BASE:-http://localhost:3002/api}
        - REACT_APP_WS_BASE=${REACT_APP_WS_BASE:-ws://localhost:3002}
        - REACT_APP_SOLANA_RPC_URL=${REACT_APP_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    container_name: robot-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - robot-server
    networks:
      - robot-network

volumes:
  mongodb_data:
  redis_data:
  ollama_data:

networks:
  robot-network:
    driver: bridge
