# MQTT Broker 配置
# Mosquitto 2.0 配置文件

# 监听端口
listener 1883
protocol mqtt

# WebSocket 监听端口
listener 9001
protocol websockets

# 允许匿名访问（开发环境）
# 生产环境建议启用认证
allow_anonymous true

# 持久化设置
persistence true
persistence_location /mosquitto/data/

# 日志设置
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true

# 最大连接数
max_connections -1

# 消息队列设置
max_queued_messages 1000
queue_type flow

# 心跳间隔
keepalive_interval 60

# 自动主题别名
auto_id_prefix auto-

# 设置用户权限（可选，生产环境建议启用）
# password_file /mosquitto/config/passwd
